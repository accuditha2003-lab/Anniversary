<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ultra Cinematic Love ❤️</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>

/* RESET */
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
min-height:100vh;
overflow-x:hidden;
color:white;
background: radial-gradient(circle at top,#ff2e63,#ff5e8a,#ff9bb3,#ffd6e0);
background-size:300% 300%;
animation:bg 10s ease infinite;
}

@keyframes bg{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

/* glow */
.glow{
position:fixed;
width:300px;
height:300px;
background:white;
filter:blur(150px);
opacity:0.2;
border-radius:50%;
pointer-events:none;
animation:float 8s infinite alternate;
}

/* HERO */
.hero{
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
text-align:center;
padding:20px;
}

.card{
background:rgba(255,255,255,0.12);
backdrop-filter:blur(20px);
padding:40px;
border-radius:25px;
max-width:800px;
width:100%;
box-shadow:0 10px 50px rgba(0,0,0,0.3);
animation:fadeIn 1.5s ease;
}

@keyframes fadeIn{
from{opacity:0;transform:translateY(20px);}
to{opacity:1;transform:translateY(0);}
}

h1{font-size:3rem;}
.subtitle{opacity:0.9;margin-top:10px;}

.heart{
font-size:70px;
margin:20px 0;
animation:beat 1s infinite;
}

@keyframes beat{
50%{transform:scale(1.2);}
}

/* BUTTON */
.btn{
padding:14px 30px;
border:none;
border-radius:30px;
background:white;
color:#ff2e63;
font-weight:bold;
cursor:pointer;
margin:10px;
transition:0.3s;
}

.btn:hover{
transform:scale(1.05);
}

/* GALLERY */
.section{
padding:80px 20px;
text-align:center;
}

.gallery{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
gap:15px;
max-width:900px;
margin:auto;
}

.gallery img{
width:100%;
height:220px;
object-fit:cover;
border-radius:20px;
cursor:pointer;
transition:0.3s;
}

.gallery img:hover{
transform:scale(1.08);
}

/* LETTER */
.letter{
max-width:800px;
margin:auto;
padding:30px;
border-radius:20px;
line-height:1.8;
background:rgba(255,255,255,0.12);
backdrop-filter:blur(15px);
animation:fadeIn 2s ease;
}

/* QUOTE SLIDER */
.quotes{
max-width:700px;
margin:auto;
text-align:center;
padding:40px;
}

.quoteBox{
background:rgba(255,255,255,0.12);
padding:30px;
border-radius:20px;
animation:fadeIn 1s ease;
min-height:120px;
}

/* MODAL */
.modal{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.9);
justify-content:center;
align-items:center;
z-index:999;
}

.modal img{
width:90%;
max-width:500px;
border-radius:20px;
}

/* LOCK */
.lock{
position:fixed;
width:100%;
height:100%;
background:black;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
z-index:9999;
}

input{
padding:12px;
border-radius:10px;
border:none;
text-align:center;
}

/* FLOAT HEARTS */
.heart-float{
position:fixed;
bottom:-20px;
animation:floatUp 8s linear infinite;
pointer-events:none;
}

@keyframes floatUp{
0%{transform:translateY(0);opacity:0;}
20%{opacity:1;}
100%{transform:translateY(-120vh);opacity:0;}
}

</style>
</head>

<body>

<!-- LOCK -->
<div class="lock" id="lock">
<h2>Enter Password ❤️</h2>
<input type="password" id="pass" placeholder="****">
<button class="btn" onclick="unlock()">Unlock</button>
</div>

<!-- glow -->
<div class="glow" style="top:10%;left:10%;"></div>
<div class="glow" style="top:60%;left:70%;"></div>

<!-- HERO -->
<section class="hero">
<div class="card">
<h1>Happy 6th Anniversary ❤️</h1>
<p class="subtitle">19 June 2020 → Forever ♾️</p>

<div class="heart">❤️</div>

<div id="days"></div>

<button class="btn" onclick="celebrate()">Celebrate 🎉</button>

</div>
</section>

<!-- QUOTES -->
<section class="section quotes">
<h2>💞 Love Quotes</h2>
<div class="quoteBox" id="quoteBox"></div>
</section>

<!-- GALLERY -->
<section class="section">
<h2>📸 Memories</h2>
<div class="gallery">
<img src="photo1.jpg" onclick="openImg(this.src)">
<img src="photo2.jpg" onclick="openImg(this.src)">
<img src="photo3.jpg" onclick="openImg(this.src)">
<img src="photo4.jpg" onclick="openImg(this.src)">
</div>
</section>

<!-- LETTER -->
<section class="section">
<div class="letter">
From 19 June 2020 ❤️<br><br>

You are my peace, my happiness, my everything.<br>
Six years later, still choosing you every day.<br><br>

Forever us ♾️❤️
</div>
</section>

<button class="btn" onclick="surprise()">Open Surprise ❤️</button>

<!-- MODAL -->
<div class="modal" id="modal" onclick="closeImg()">
<img id="modalImg">
</div>

<audio id="song" src="song.mp3" loop></audio>

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>

<script>

/* PASSWORD */
function unlock(){
let p=document.getElementById("pass").value;
if(p==="1015"){
document.getElementById("lock").style.display="none";
celebrate();
document.getElementById("song").play().catch(()=>{});
}
else{
alert("Wrong Password ❤️");
}
}

/* DAYS */
const start=new Date("2020-06-19");
const now=new Date();
const days=Math.floor((now-start)/(1000*60*60*24));

document.getElementById("days").innerHTML=
"❤️ Together for "+days+" days";

/* CONFETTI */
function celebrate(){
confetti({particleCount:250,spread:160});
}

/* MUSIC */
function music(){
document.getElementById("song").play();
}

/* SURPRISE */
function surprise(){
confetti({particleCount:400,spread:180});
alert("❤️ I Love You Forever ❤️");
}

/* IMAGE */
function openImg(src){
document.getElementById("modal").style.display="flex";
document.getElementById("modalImg").src=src;
}

function closeImg(){
document.getElementById("modal").style.display="none";
}

/* FLOAT HEARTS */
setInterval(()=>{
let h=document.createElement("div");
h.className="heart-float";
h.innerHTML="❤️";
h.style.left=Math.random()*100+"vw";
h.style.fontSize=(15+Math.random()*25)+"px";
document.body.appendChild(h);
setTimeout(()=>h.remove(),8000);
},250);

/* QUOTES SLIDER */
const quotes=[
"Every love story is beautiful, but ours is my favorite ❤️",
"You are my today and all of my tomorrows ♾️",
"I still fall for you every single day ❤️",
"Forever isn’t long enough with you ❤️"
];

let i=0;
function showQuote(){
document.getElementById("quoteBox").innerHTML=quotes[i];
i=(i+1)%quotes.length;
}
setInterval(showQuote,3000);
showQuote();

/* AUTO CONFETTI */
window.onload=celebrate;

</script>

</body>
</html>
